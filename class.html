<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>초·중·고 종강시험 & 비유 퀴즈</title>
<style>html{zoom:1.25;}</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f4ef;--surface:#fff;--accent:#2d6a4f;--accent-light:#e8f5ee;--accent-dark:#1b4332;--warn:#b5451b;--warn-light:#fdf0eb;--gold:#c9a84c;--text:#1a1a1a;--text-muted:#6b6b6b;--border:#ddd8cf;--radius:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem 4rem;}
.page{max-width:720px;margin:0 auto;}
/* Lock */
.lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:2rem;}
.lock-screen h2{font-family:'Noto Serif KR',serif;font-size:22px;color:var(--accent-dark);margin-bottom:6px;}
.lock-screen p{font-size:13px;color:var(--text-muted);margin-bottom:1.5rem;}
.lock-input{font-family:'Noto Sans KR',sans-serif;font-size:16px;padding:10px 16px;border:1px solid var(--border);border-radius:8px;width:220px;text-align:center;margin-bottom:8px;}
.lock-input:focus{outline:none;border-color:var(--accent);}
.lock-error{font-size:12px;color:var(--warn);height:16px;margin-bottom:8px;}
/* Header */
.site-header{text-align:center;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);}
.eyebrow{font-size:11px;letter-spacing:.15em;color:var(--gold);margin-bottom:6px;}
.site-header h1{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:600;}
.slogan{font-size:12px;font-weight:700;color:var(--warn);margin-top:.4rem;}
/* Name bar */
.name-bar{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-bottom:1rem;}
.name-input{font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:var(--surface);width:110px;}
.name-input:focus{outline:none;border-color:var(--accent);}
.perfect-count{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--accent-dark);background:var(--accent-light);border:1px solid #95d5b2;border-radius:8px;padding:5px 10px;white-space:nowrap;}
/* Main tabs */
.main-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;}
.main-tab{flex:1;min-width:80px;padding:7px 4px;border:none;background:transparent;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:background .15s;touch-action:manipulation;}
.main-tab.active{background:var(--accent);color:#fff;}
/* Mode bar */
.mode-bar{display:flex;gap:4px;margin-bottom:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;}
.mode-btn{flex:1;padding:8px;border:none;background:transparent;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:background .15s;touch-action:manipulation;}
.mode-btn.active{background:var(--accent);color:#fff;}
/* Options */
.options-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;font-size:13px;}
.options-bar label{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text-muted);}
.options-bar input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;}
.reset-btns{display:flex;gap:6px;margin-left:auto;}
.toggle-switch-wrap{display:flex;align-items:center;gap:6px;}
.toggle-switch-label{font-size:12px;color:var(--text-muted);white-space:nowrap;}
.toggle-switch{position:relative;width:38px;height:22px;background:#ccc;border-radius:99px;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;padding:0;touch-action:manipulation;}
.toggle-switch.on{background:var(--accent);}
.toggle-switch .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
.toggle-switch.on .knob{left:18px;}
/* Progress */
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.prog-track{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s;}
.prog-label{font-size:13px;color:var(--text-muted);white-space:nowrap;}
.score-pill{font-size:12px;padding:3px 10px;border-radius:99px;white-space:nowrap;}
.pill-trace{background:#f0f0ff;color:#3333aa;}
.pill-study{background:var(--accent-light);color:var(--accent-dark);}
.pill-exam{background:#fff3cd;color:#7a5800;}
/* Jump dots */
.q-jump{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem;}
.q-dot{height:26px;padding:0 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;white-space:nowrap;touch-action:manipulation;}
.q-dot.done-correct{background:var(--accent);color:#fff;border-color:var(--accent);}
.q-dot.done-wrong{background:#f4a58a;color:#7a1f00;border-color:#f4a58a;}
.q-dot.done-exam{background:#ccc;color:#555;border-color:#ccc;}
.q-dot.current{border-color:var(--accent);border-width:2px;font-weight:700;}
/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;}
.q-num{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--gold);display:block;margin-bottom:4px;}
.q-text{font-size:15px;line-height:1.85;color:var(--text);margin-bottom:1.25rem;}
/* Sub-section banner */
.sub-banner{background:#f0efea;border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:6px 12px;margin-bottom:10px;margin-top:14px;font-size:12px;font-weight:700;color:var(--text-muted);}
.sub-banner:first-child{margin-top:0;}
/* Sub question */
.sub-q{margin-bottom:1rem;}
.sub-q:last-child{margin-bottom:0;}
.sub-label{font-size:13px;color:var(--text-muted);margin-bottom:5px;}
/* Trace answer display */
.trace-ans{font-size:13px;line-height:1.75;padding:8px 12px;background:#f0f8f4;border-radius:6px;border:1px solid #c5e8d8;color:var(--accent-dark);margin-bottom:6px;user-select:none;}
textarea{width:100%;font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.75;padding:9px 13px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);resize:vertical;min-height:48px;transition:border-color .2s;}
textarea:focus{outline:none;border-color:var(--accent);}
/* Buttons */
.btn-row{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;}
button{font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;padding:7px 15px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:background .15s;touch-action:manipulation;}
button:hover{background:var(--bg);}
button.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
button.primary:hover{background:var(--accent-dark);}
button.danger{background:var(--warn-light);color:var(--warn);border-color:#f4a58a;}
button.sm{font-size:12px;padding:5px 11px;}
/* Feedback */
.feedback{border-radius:8px;padding:9px 13px;font-size:13px;line-height:1.65;margin-top:7px;}
.feedback.correct{background:var(--accent-light);color:var(--accent-dark);border:1px solid #95d5b2;}
.feedback.wrong{background:var(--warn-light);color:var(--warn);border:1px solid #f4a58a;}
.answer-box{margin-top:7px;padding:9px 13px;background:#f9f8f5;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;font-size:13px;line-height:1.75;}
.answer-box strong{color:var(--accent-dark);}
.diff-ok{color:var(--accent);}
.diff-bad{color:var(--warn);text-decoration:underline;}
.diff-box{display:inline-block;color:#e53935;border:1.5px solid #e53935;border-radius:3px;padding:0 1px;background:rgba(229,57,53,.06);}
.space-correction{display:inline-block;color:#e53935;font-size:.65em;font-weight:900;vertical-align:super;font-family:serif;}
/* Nav */
.nav-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:.5rem;}
.nav-right{display:flex;gap:8px;margin-left:auto;}
/* Score */
.score-screen{padding:2rem 0;text-align:center;}
.score-circle{width:110px;height:110px;border-radius:50%;border:3px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1rem;}
.score-num{font-family:'Noto Serif KR',serif;font-size:34px;font-weight:600;color:var(--accent);line-height:1;}
.score-sub{font-size:12px;color:var(--text-muted);margin-top:4px;}
.score-msg{font-size:15px;color:var(--text-muted);margin-bottom:1.5rem;}
.stat-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem;}
.stat-chip{font-size:12px;padding:3px 12px;border-radius:99px;border:1px solid var(--border);}
.score-btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem;}
.wrong-list{text-align:left;margin-top:1rem;}
.wrong-list-title{font-size:13px;color:var(--text-muted);padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.wrong-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:8px;font-size:13px;line-height:1.75;}
.wrong-item .wq{color:var(--text-muted);font-size:12px;margin-bottom:3px;}
.wrong-item .wa{color:var(--accent-dark);font-weight:500;}
/* Wrong note */
.empty-note{text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:14px;}
/* Ceremony */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;}
.perfect-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10000;pointer-events:none;}
.perfect-badge{background:linear-gradient(135deg,#2d6a4f,#52b788);color:#fff;border-radius:24px;padding:2rem 3rem;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.25);animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) forwards;}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.perfect-badge .trophy{font-size:56px;display:block;margin-bottom:8px;}
.perfect-badge .pt{font-family:'Noto Serif KR',serif;font-size:26px;font-weight:600;margin-bottom:4px;}
.perfect-badge .ps{font-size:13px;opacity:.85;}
.footer-stamp{position:fixed;bottom:12px;right:14px;font-size:10px;color:var(--text-muted);pointer-events:none;opacity:.7;}
</style>
</head>
<body>

<div class="lock-screen" id="lock-screen">
  <!-- 변환 도구 화면 -->
  <div id="tool-screen" style="display:none;text-align:center">
    <h2>🔑 비밀번호 해시 변환 도구</h2>
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:1rem">새 비밀번호를 입력하면 해시값을 생성합니다</p>
    <input id="new-pwd" type="text" class="lock-input" placeholder="새 비밀번호 입력" style="margin-bottom:8px">
    <br>
    <button class="primary" onclick="genHash()" style="margin-bottom:1rem">해시 생성</button>
    <div id="hash-result" style="display:none;font-size:12px;padding:12px;background:#f0f0f0;border-radius:8px;max-width:320px;text-align:left;margin-top:8px">
      <div style="color:var(--text-muted);margin-bottom:6px">아래 해시값을 복사 후 GitHub의 코드에서 PWD_HASH= 부분에 붙여넣으세요:</div>
      <div id="hash-val" style="font-family:monospace;font-size:11px;color:var(--accent-dark);margin-bottom:8px;word-break:break-all"></div>
      <button onclick="copyHash()">📋 복사</button>
    </div>
  </div>
  <!-- 비밀번호 화면 -->
  <div id="pwd-screen">
    <h2>🔒 시험 퀴즈</h2>
    <p>비밀번호를 입력하세요</p>
    <input class="lock-input" id="lock-input" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPwd()">
    <div class="lock-error" id="lock-error"></div>
    <button class="primary" onclick="checkPwd()">확인</button>
  </div>
</div>

<canvas id="confetti-canvas" style="display:none"></canvas>
<div id="perfect-overlay" style="display:none" class="perfect-overlay">
  <div class="perfect-badge">
    <span class="trophy">🏆</span>
    <div class="pt">완벽합니다!</div>
    <div class="ps">필승! 강력하고 확실하게 승리하자!!</div>
  </div>
</div>

<div class="page" id="main-page" style="display:none">
  <header class="site-header">
    <div class="eyebrow">빌립지파 총회 글로벌 사명자 교육</div>
    <h1>초·중·고 종강시험 & 비유 퀴즈</h1>
    <div class="slogan">✦ 필승! 강력하고 확실하게 승리하자!! ✦</div>
  </header>

  <div class="name-bar">
    <input class="name-input" id="user-name" type="text" placeholder="이름 입력" maxlength="10" oninput="saveName()">
    <div class="perfect-count">🏆 <span id="perfect-count-num">0</span>회 <span style="cursor:pointer;margin-left:4px;font-size:11px;opacity:.6" onclick="resetPerfectCount()" title="초기화">✕</span></div>
  </div>

  <!-- 메인 탭 -->
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMain('elem-exam')">📝 초등 시험</button>
    <button class="main-tab" onclick="switchMain('mid-exam')">📝 중등 시험</button>
    <button class="main-tab" onclick="switchMain('elem-toc')">📚 초등 목차</button>
    <button class="main-tab" onclick="switchMain('mid-toc')">📚 중등 목차</button>
    <button class="main-tab" onclick="switchMain('high-toc')">📚 고등 목차</button>
    <button class="main-tab" onclick="switchMain('parable')">🌿 비유 퀴즈</button>
    <button class="main-tab" onclick="switchMain('wrong-note')">📒 오답 노트</button>
  </div>

  <div id="section-elem-exam"><div id="area-elem-exam"></div></div>
  <div id="section-mid-exam" style="display:none"><div id="area-mid-exam"></div></div>
  <div id="section-elem-toc" style="display:none"><div id="area-elem-toc"></div></div>
  <div id="section-mid-toc" style="display:none"><div id="area-mid-toc"></div></div>
  <div id="section-high-toc" style="display:none"><div id="area-high-toc"></div></div>
  <div id="section-parable" style="display:none"><div id="area-parable"></div></div>
  <div id="section-wrong-note" style="display:none"><div id="area-wrong-note"></div></div>

</div>

<script>
// ── 비밀번호 ──
// SHA-256 해시 함수
async function sha256(message){
  const msgBuffer=new TextEncoder().encode(message);
  const hashBuffer=await crypto.subtle.digest('SHA-256',msgBuffer);
  const hashArray=Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
}

// 저장된 비밀번호 해시 (chdrmftk!@의 SHA-256)
const PWD_HASH='25aaa5df04332f99d5ff9dffea1ec3b01f2d373ee17ad87bff0ceb4489eeb669';

// 실패 횟수 추적
let failCount=0, lockUntil=0;

async function checkPwd(){
  // 잠금 확인
  if(Date.now()<lockUntil){
    const sec=Math.ceil((lockUntil-Date.now())/1000);
    document.getElementById('lock-error').textContent=`${sec}초 후 다시 시도하세요.`;
    return;
  }
  const val=document.getElementById('lock-input').value;
  const hash=await sha256(val);
  if(hash===PWD_HASH){
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('main-page').style.display='block';
    loadUserData();
    initAll();
  } else {
    failCount++;
    if(failCount>=5){
      lockUntil=Date.now()+60000;
      failCount=0;
      document.getElementById('lock-error').textContent='5회 실패. 1분 후 다시 시도하세요.';
    } else {
      document.getElementById('lock-error').textContent=`비밀번호가 틀렸습니다. (${failCount}/5)`;
    }
    document.getElementById('lock-input').value='';
  }
}
// ?tool=hash 접속 시 변환 도구 표시
if(new URLSearchParams(window.location.search).get('tool')==='hash'){
  document.getElementById('tool-screen').style.display='block';
  document.getElementById('pwd-screen').style.display='none';
} else {
  document.getElementById('lock-input').focus();
}

async function genHash(){
  const val=document.getElementById('new-pwd').value;
  if(!val){ alert('비밀번호를 입력하세요'); return; }
  const msgBuffer=new TextEncoder().encode(val);
  const hashBuffer=await crypto.subtle.digest('SHA-256',msgBuffer);
  const hashArray=Array.from(new Uint8Array(hashBuffer));
  const hash=hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
  document.getElementById('hash-val').textContent=hash;
  document.getElementById('hash-result').style.display='block';
}

function copyHash(){
  const txt=document.getElementById('hash-val').textContent;
  if(txt) navigator.clipboard.writeText(txt).then(()=>alert('복사됐어요!'));
}

// ── 정규화 ──
function normalizeSpecial(s){ return s.replace(/→|->|>/g,',').replace(/[·•・]/g,',').replace(/[、，]/g,','); }
function normStr(s,strict){
  let r=(s||'').trim();
  r=normalizeSpecial(r);
  r=r.replace(/\s*,\s*/g,',');
  if(!strict) r=r.replace(/\s+/g,'');
  else r=r.replace(/\s+/g,' ').trim();
  return r;
}
function isMatch(u,a,checkboxId='chk-space'){
  const el=document.getElementById(checkboxId);
  const strict=el?el.checked:false;
  return normStr(u,strict)===normStr(a,strict);
}
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function diffHtmlBox(user,ans){
  const uChars=(user||'').replace(/ /g,'').split('');
  const aCharsN=normStr(ans,false).split('');
  const aCharsO=ans.replace(/ /g,'').split('');
  const m=uChars.length,n=aCharsN.length;
  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++){
    if(normalizeSpecial(uChars[i-1])===aCharsN[j-1]) dp[i][j]=dp[i-1][j-1]+1;
    else dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1]);
  }
  const uM=new Array(m).fill(-1), aM=new Array(n).fill(-1);
  let i=m,j=n;
  while(i>0&&j>0){
    if(normalizeSpecial(uChars[i-1])===aCharsN[j-1]){uM[i-1]=j-1;aM[j-1]=i-1;i--;j--;}
    else if(dp[i-1][j]>dp[i][j-1]) i--;
    else j--;
  }
  const aSpB={};let ci=0;
  for(let k=0;k<ans.length;k++){if(ans[k]===' ')aSpB[ci]=true;else ci++;}
  let res='',ui=0,ai=0;
  while(ui<m||ai<n){
    if(ui<m&&ai<n&&uM[ui]===ai&&aM[ai]===ui){
      if(aSpB[ai]) res+=' ';
      res+=escHtml(uChars[ui]);ui++;ai++;
    } else if(ui<m&&uM[ui]===-1){
      res+=`<span class="diff-box">${escHtml(uChars[ui])}</span>`;ui++;
    } else if(ai<n&&aM[ai]===-1){
      if(aSpB[ai]) res+=' ';
      res+=`<span style="color:#e53935;font-weight:600">${escHtml(aCharsO[ai])}</span>`;ai++;
    } else {
      if(ui<m){res+=`<span class="diff-box">${escHtml(uChars[ui])}</span>`;ui++;}
      else if(ai<n){if(aSpB[ai])res+=' ';res+=`<span style="color:#e53935;font-weight:600">${escHtml(aCharsO[ai])}</span>`;ai++;}
    }
  }
  return res;
}

function spaceCorrection(user,ans){
  const uRaw=user||'',aRaw=ans||'';
  const aSpaces={};let ci=0;
  for(let i=0;i<aRaw.length;i++){if(aRaw[i]===' ')aSpaces[ci]=true;else ci++;}
  let h='',charIdx=0;
  for(let i=0;i<uRaw.length;i++){
    const ch=uRaw[i];
    if(ch===' '){h+=aSpaces[charIdx]?' ':`<span class="space-correction">⌒</span>`;}
    else{if(aSpaces[charIdx]&&(i===0||uRaw[i-1]!==' '))h+=`<span class="space-correction">∨</span>`;h+=escHtml(ch);charIdx++;}
  }
  return h;
}

function calcHeight(text){
  const l=(text||'').length;
  if(l>200)return'160px';if(l>120)return'110px';if(l>60)return'80px';return'52px';
}

function scrollToInput(el){
  if(!el)return;
  const rect=el.getBoundingClientRect();
  const viewH=window.innerHeight;
  const offset=window.scrollY+rect.top-(viewH/2-rect.height/2);
  window.scrollTo({top:Math.max(0,offset),behavior:'smooth'});
}

function showPerfect(){

  runConfetti(cv);
  setTimeout(()=>{ov.style.display='none';cv.style.display='none';},4000);

function runConfetti(canvas){
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=Array.from({length:120},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,
    r:Math.random()*6+4,d:Math.random()*80+20,
    color:['#2d6a4f','#52b788','#c9a84c','#f4a261','#e76f51'][Math.floor(Math.random()*5)],
    tilt:Math.random()*10-10,tiltAngle:0,tiltSpeed:Math.random()*.1+.05
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.beginPath();ctx.lineWidth=p.r/2;ctx.strokeStyle=p.color;
      ctx.moveTo(p.x+p.tilt+p.r/4,p.y);ctx.lineTo(p.x+p.tilt,p.y+p.tilt+p.r/4);ctx.stroke();
      p.tiltAngle+=p.tiltSpeed;p.y+=Math.cos(frame/20+p.d)+1+p.r/4;
      p.x+=Math.sin(frame/30)*.5;p.tilt=Math.sin(p.tiltAngle)*12;
      if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}
    });
    frame++;
    if(frame<240)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// 범용 퀴즈 엔진
// ════════════════════════════════════════════
// 각 섹션은 아래 구조를 가짐:
// {
//   areaId: 'area-elem-exam',
//   chkSpaceId: 'chk-space-ee',
//   items: [  // 문제 목록
//     {
//       id: 'ee_1',
//       label: 'Q1',
//       question: '문제 텍스트',
//       parts: [
//         {key:'ee_1_1', label:'① ...', answer:'정답'}
//       ]
//     }

// 상태 저장소
const STATE = {};
// STATE[key] = {ans:'', checked:false, revealed:false}

function getState(key){
  if(!STATE[key]) STATE[key]={ans:'',checked:false,revealed:false};
  return STATE[key];
}

// 각 섹션별 현재 인덱스
const CURRENT_IDX = {};
const MODES = {}; // 'trace'|'study'|'exam'
const ORDER_MODE = {}; // 'normal'|'random'|'reverse'
let MID_TOC_TITLE_ONLY = false; // 중등 목차 전용: true면 제목만 채점

function toggleMidTocTitleOnly(areaId){
  MID_TOC_TITLE_ONLY = !MID_TOC_TITLE_ONLY;
  const cfg = getCfg(areaId);
  if(cfg) renderSection(cfg);
}

function initSection(cfg){
  CURRENT_IDX[cfg.areaId]=0;
  MODES[cfg.areaId]='trace';
  ORDER_MODE[cfg.areaId]='normal';
  // 원본 아이템을 최초 한 번만 저장 (덮어쓰기 방지)
  if(!ITEMS_ORIGINAL[cfg.areaId]){
    ITEMS_ORIGINAL[cfg.areaId]=cfg.items.map(it=>({...it}));
  }
}

function renderSection(cfg){
  const areaId=cfg.areaId;
  const mode=MODES[areaId]||'trace';
  const idx=CURRENT_IDX[areaId]||0;
  const item=cfg.items[idx];
  const total=cfg.items.length;
  const chkId=cfg.chkSpaceId;

  // 중등 목차 전용: 제목만 모드 — '/' 기준 제목만 정답으로 사용
  const titleOnly = (areaId==='area-mid-toc') && !!MID_TOC_TITLE_ONLY;
  const effAnswer = (ans)=> titleOnly ? ans.split('/')[0].trim() : ans;

  // count correct
  let correct=0;
  cfg.items.forEach(it=>it.parts.forEach(p=>{
    const st=getState(p.key);
    if(st.checked&&isMatch(st.ans,effAnswer(p.answer),chkId)) correct++;
  }));
  const totalParts=cfg.items.reduce((s,it)=>s+it.parts.length,0);

  // dots
  let dotsHtml='<div class="q-jump">';
  cfg.items.forEach((it,i)=>{
    const allC=it.parts.every(p=>getState(p.key).checked);
    const allOk=allC&&it.parts.every(p=>isMatch(getState(p.key).ans,effAnswer(p.answer),chkId));
    let cls='q-dot'+(i===idx?' current':'');
    if(allC){
      if(mode==='exam') cls+=' done-exam';
      else cls+=allOk?' done-correct':' done-wrong';
    }
    dotsHtml+=`<button class="${cls}" onclick="goItem('${areaId}',${i})">${it.label}</button>`;
  });
  dotsHtml+='</div>';

  // parts
  const partsHtml=item.parts.map((p,pi)=>{
    const st=getState(p.key);
    const pAnswer=effAnswer(p.answer);
    const isCorrect=st.checked&&isMatch(st.ans,pAnswer,chkId);
    let traceAns=mode==='trace'?`<div class="trace-ans">${escHtml(pAnswer)}</div>`:'';
    let feedHtml='';
    if(st.checked&&mode!=='exam'){
      if(isCorrect){
        const strict=document.getElementById(chkId)?.checked;
        const hasSpaceDiff=!strict&&st.ans.replace(/\s/g,'')===pAnswer.replace(/\s/g,'')&&st.ans!==pAnswer;
        feedHtml=hasSpaceDiff
          ?`<div class="feedback correct" id="feed_${p.key}">✓ 맞았어요! (띄어쓰기 교정)<br><span style="font-size:12px">${spaceCorrection(st.ans,pAnswer)}</span></div>`
          :`<div class="feedback correct" id="feed_${p.key}">✓ 정확히 맞았어요!</div>`;
      } else {
        const u=normStr(st.ans,false),a=normStr(pAnswer,false);
        const mt=[...u].filter((c,i)=>c===a[i]).length;
        const pct2=a.length>0?Math.round(mt/a.length*100):0;
        feedHtml=`<div class="feedback wrong" id="feed_${p.key}"><div style="margin-bottom:4px">틀렸어요 (${pct2}% 일치)</div><div style="font-size:12px">내 답: ${diffHtmlBox(st.ans,pAnswer)}</div></div>`;
        if(st.revealed) feedHtml+=`<div class="answer-box"><strong>정답:</strong> ${escHtml(pAnswer)}</div>`;
      }
    }
    if(st.checked&&mode==='exam') feedHtml=`<div style="font-size:12px;color:var(--text-muted);margin-top:4px;font-style:italic">모의고사 모드 — 결과 확인 후 정답을 볼 수 있어요</div>`;

    const btnHtml=(!st.checked)
      ?`<div class="btn-row"><button class="primary" onclick="doCheck('${areaId}','${p.key}',${pi})">확인</button></div>`
      :(mode!=='exam'?`<div class="btn-row">${!st.revealed&&!isCorrect?`<button onclick="doReveal('${p.key}')">정답 보기</button>`:''}<button onclick="doRetry('${areaId}','${p.key}',${pi})">다시 쓰기</button></div>`:'');

    return `<div class="sub-q" id="subq_${p.key}">
      ${p.label?`<div class="sub-label">${p.label}</div>`:''}
      ${traceAns}
      <textarea id="ta_${p.key}" style="min-height:${calcHeight(pAnswer)}">${escHtml(st.ans)}</textarea>
      ${feedHtml}${btnHtml}
    </div>`;
  }).join('');

  const allChecked=item.parts.every(p=>getState(p.key).checked);
  const isLast=idx===total-1;
  const allDone=cfg.items.every(it=>it.parts.every(p=>getState(p.key).checked));
  let navHtml='';
  if(allChecked||(mode==='exam')){
    navHtml=`<div class="nav-row">
      ${idx>0?`<button onclick="goItem('${areaId}',${idx-1})">← 이전</button>`:'<span></span>'}
      <div class="nav-right">
        ${!isLast?`<button class="primary" onclick="goItem('${areaId}',${idx+1})">다음 →</button>`:''}
        ${(isLast||allDone)?`<button class="primary" onclick="showScore('${areaId}')">결과 보기 →</button>`:''}
      </div>
    </div>`;
  }

  const pillClass=mode==='trace'?'pill-trace':mode==='study'?'pill-study':'pill-exam';
  const pillText=mode==='trace'?'따라쓰기':mode==='study'?`맞은 것 ${correct}개`:'모의고사';

  const midTocToggleHtml = (areaId==='area-mid-toc') ? `
    <div class="toggle-switch-wrap" style="margin-left:auto">
      <span class="toggle-switch-label">${titleOnly?'제목만':'제목+성구'}</span>
      <button class="toggle-switch${titleOnly?' on':''}" onclick="toggleMidTocTitleOnly('${areaId}')"><span class="knob"></span></button>
    </div>` : '';

  const area=document.getElementById(areaId);
  area.innerHTML=`
    <div class="mode-bar">
      <button class="mode-btn${mode==='trace'?' active':''}" onclick="setMode('${areaId}','trace')">✏️ 따라쓰기</button>
      <button class="mode-btn${mode==='study'?' active':''}" onclick="setMode('${areaId}','study')">📖 학습 모드</button>
      <button class="mode-btn${mode==='exam'?' active':''}" onclick="setMode('${areaId}','exam')">📝 모의고사</button>
    </div>
    <div class="options-bar">
      <label><input type="checkbox" id="${chkId}"> 띄어쓰기까지 정확히</label>
      <label><input type="checkbox" id="chk-random-${areaId}" ${(ORDER_MODE[areaId]==='random')?'checked':''} onchange="applyOrder('${areaId}','random')"> 무작위</label>
      <label><input type="checkbox" id="chk-reverse-${areaId}" ${(ORDER_MODE[areaId]==='reverse')?'checked':''} onchange="applyOrder('${areaId}','reverse')"> 거꾸로</label>
      ${midTocToggleHtml}
      <div class="reset-btns">
        <button class="sm danger" onclick="resetItem('${areaId}',${idx})">이 문제 초기화</button>
        <button class="sm danger" onclick="resetAll('${areaId}')">전체 초기화</button>
      </div>
    </div>
    <div class="progress-row">
      <span class="prog-label">${idx+1} / ${total}</span>
      <div class="prog-track"><div class="prog-fill" style="width:${Math.round(idx/total*100)}%"></div></div>
      <span class="score-pill ${pillClass}">${pillText}</span>
    </div>
    ${dotsHtml}
    <div class="card">
      <span class="q-num">${item.label}</span>
      <div class="q-text">${escHtml(item.question)}</div>
      ${partsHtml}
    </div>
    ${navHtml}`;

  // 엔터 바인딩
  item.parts.forEach((p,pi)=>{
    const ta=document.getElementById('ta_'+p.key);
    if(!ta)return;
    bindEnter(ta,areaId,p.key,pi,cfg);
  });

  // 포커스
  const firstUnchecked=item.parts.find(p=>!getState(p.key).checked);
  if(firstUnchecked){
    const ta=document.getElementById('ta_'+firstUnchecked.key);
    if(ta){
      const isFirstItem=(idx===0&&firstUnchecked===item.parts[0]);
      if(!isFirstItem) scrollToInput(ta);
      setTimeout(()=>ta.focus(),80);
    }
  }
}

function bindEnter(ta,areaId,key,pi,cfg){
  ta.onkeydown=function(e){
    if(e.key!=='Enter'||e.shiftKey)return;
    e.preventDefault();
    const st=getState(key);
    const item=cfg.items[CURRENT_IDX[areaId]];
    const p=item.parts[pi];
    const chkId=cfg.chkSpaceId;
    const titleOnly = (areaId==='area-mid-toc') && !!MID_TOC_TITLE_ONLY;
    const pAnswer = titleOnly ? p.answer.split('/')[0].trim() : p.answer;
    if(!st.checked){
      doCheck(areaId,key,pi,cfg);
    } else if(isMatch(st.ans,pAnswer,chkId)){
      // 맞음 → 다음
      moveNext(areaId,key,pi,cfg);
    } else {
      // 틀림 → 초기화
      st.ans='';st.checked=false;st.revealed=false;
      ta.value='';
      const oldFeed=document.getElementById('feed_'+key);
      if(oldFeed)oldFeed.remove();
      scrollToInput(ta);
      setTimeout(()=>ta.focus(),60);
      bindEnter(ta,areaId,key,pi,cfg);
    }
  };
}

function doCheck(areaId,key,pi,cfgArg){
  const cfg=cfgArg||getCfg(areaId);
  const ta=document.getElementById('ta_'+key);
  const st=getState(key);
  st.ans=ta?ta.value:st.ans;
  st.checked=true;
  const item=cfg.items[CURRENT_IDX[areaId]];
  const p=item.parts[pi];
  const chkId=cfg.chkSpaceId;
  const titleOnly = (areaId==='area-mid-toc') && !!MID_TOC_TITLE_ONLY;
  const pAnswer = titleOnly ? p.answer.split('/')[0].trim() : p.answer;
  const correct=isMatch(st.ans,pAnswer,chkId);
  if(!correct){
    wrongNote[key]={qLabel:item.label,qText:item.question,partLabel:p.label,answer:pAnswer,ua:st.ans};
  } else { delete wrongNote[key]; }

  if(correct){
    renderSection(cfg);
    moveNext(areaId,key,pi,cfg);
  } else {
    // 틀림: 피드백 삽입, render 안 함
    const u=normStr(st.ans,false),a=normStr(pAnswer,false);
    const mt=[...u].filter((c,i)=>c===a[i]).length;
    const pct2=a.length>0?Math.round(mt/a.length*100):0;
    const feedHtml=`<div class="feedback wrong" id="feed_${key}"><div style="margin-bottom:4px">틀렸어요 (${pct2}% 일치)</div><div style="font-size:12px">내 답: ${diffHtmlBox(st.ans,pAnswer)}</div></div>`;
    const old=document.getElementById('feed_'+key);
    if(old)old.remove();
    if(ta){
      ta.insertAdjacentHTML('afterend',feedHtml);
      ta.readOnly=false;
      scrollToInput(ta);
      setTimeout(()=>ta.focus(),60);
      bindEnter(ta,areaId,key,pi,cfg);
    }
  }
}

function doReveal(key){
  getState(key).revealed=true;
  // find cfg
  const cfg=getCfgByKey(key);
  if(cfg) renderSection(cfg);
}

function doRetry(areaId,key,pi){
  const st=getState(key);
  st.ans='';st.checked=false;st.revealed=false;
  const cfg=getCfg(areaId);
  renderSection(cfg);
  setTimeout(()=>{
    const ta=document.getElementById('ta_'+key);
    if(ta){ta.value='';ta.focus();}
  },30);
}

function moveNext(areaId,key,pi,cfg){
  const item=cfg.items[CURRENT_IDX[areaId]];
  // 다음 미채점 소문항
  for(let npi=pi+1;npi<item.parts.length;npi++){
    const np=item.parts[npi];
    if(!getState(np.key).checked){
      setTimeout(()=>{
        const ta=document.getElementById('ta_'+np.key);
        if(ta){scrollToInput(ta);ta.focus();}
      },80);
      return;
    }
  }
  // 마지막 소문항 — 엔터로 다음 문제
  setTimeout(()=>{
    const ta=document.getElementById('ta_'+key);
    if(ta){
      ta.focus();
      ta.onkeydown=function(e){
        if(e.key!=='Enter'||e.shiftKey)return;
        e.preventDefault();
        const idx=CURRENT_IDX[areaId];
        if(idx<cfg.items.length-1) goItem(areaId,idx+1);
        else showScore(areaId);
      };
    }
  },80);
}

function goItem(areaId,idx){
  CURRENT_IDX[areaId]=idx;
  const cfg=getCfg(areaId);
  renderSection(cfg);
  // 첫 번째 입력칸으로 스크롤 (단일/다중 소문항 모두)
  const item=cfg.items[idx];
  setTimeout(()=>{
    if(item&&item.parts.length>0){
      const ta=document.getElementById('ta_'+item.parts[0].key);
      if(ta){ scrollToInput(ta); ta.focus(); }
    }
  },60);
}

function setMode(areaId,mode){
  MODES[areaId]=mode;
  const cfg=getCfg(areaId);
  renderSection(cfg);
}

function resetItem(areaId,idx){
  const cfg=getCfg(areaId);
  cfg.items[idx].parts.forEach(p=>{STATE[p.key]={ans:'',checked:false,revealed:false};});
  renderSection(cfg);
}

function resetAll(areaId){
  if(!confirm('모든 답을 초기화할까요?'))return;
  const cfg=getCfg(areaId);
  // 원본 순서로 복원
  if(ITEMS_ORIGINAL[areaId]) cfg.items=[...ITEMS_ORIGINAL[areaId]];
  ORDER_MODE[areaId]='normal';
  cfg.items.forEach(it=>it.parts.forEach(p=>{STATE[p.key]={ans:'',checked:false,revealed:false};}));
  CURRENT_IDX[areaId]=0;
  renderSection(cfg);
}

function showScore(areaId){
  const cfg=getCfg(areaId);
  const chkId=cfg.chkSpaceId;
  const titleOnly = (areaId==='area-mid-toc') && !!MID_TOC_TITLE_ONLY;
  const effAnswer = (ans)=> titleOnly ? ans.split('/')[0].trim() : ans;
  let correct=0,wrong=[],total=0;
  cfg.items.forEach(it=>it.parts.forEach(p=>{
    total++;
    const st=getState(p.key);
    const pAnswer=effAnswer(p.answer);
    if(isMatch(st.ans,pAnswer,chkId)) correct++;
    else wrong.push({qLabel:it.label,qText:it.question,partLabel:p.label,answer:pAnswer,ua:st.ans});
  }));
  const pct=Math.round(correct/total*100);
  const msg=pct===100?'필승! 완벽합니다!':pct>=80?'아주 잘 하셨어요!':pct>=60?'조금만 더 연습해 봐요!':'반복 학습해 보세요.';
  if(pct===100){setTimeout(showPerfect,400);if(MODES[areaId]==='exam') addPerfectCount();}
  const wHtml=wrong.map(w=>`<div class="wrong-item"><div class="wq">${escHtml(w.qLabel)} ${w.partLabel?'— '+escHtml(w.partLabel):''}</div><div class="wa">정답: ${escHtml(w.answer)}</div>${w.ua?`<div style="font-size:12px;margin-top:4px">내 답: ${diffHtmlBox(w.ua,w.answer)}</div>`:''}</div>`).join('');
  const area=document.getElementById(areaId);
  area.innerHTML=`<div class="score-screen">
    <div class="score-circle"><div class="score-num">${pct}%</div><div class="score-sub">${correct}/${total}</div></div>
    <div class="score-msg">${msg}</div>
    <div class="stat-row">
      <span class="stat-chip" style="background:var(--accent-light);color:var(--accent-dark)">정답 ${correct}</span>
      <span class="stat-chip" style="background:var(--warn-light);color:var(--warn)">오답 ${total-correct}</span>
    </div>
    <div class="score-btn-row">
      <button onclick="restartSection('${areaId}')">처음부터 다시</button>
      <button class="primary" onclick="retryWrong('${areaId}')">틀린 것만 다시</button>
      <button onclick="switchMain('wrong-note')">오답 노트 →</button>
    </div>
    ${wrong.length>0?`<div class="wrong-list"><div class="wrong-list-title">틀린 문항 (${wrong.length}개)</div>${wHtml}</div>`:''}
  </div>`;
}

function restartSection(areaId){
  const cfg=getCfg(areaId);
  cfg.items.forEach(it=>it.parts.forEach(p=>{STATE[p.key]={ans:'',checked:false,revealed:false};}));
  CURRENT_IDX[areaId]=0;
  renderSection(cfg);
}

function retryWrong(areaId){
  const cfg=getCfg(areaId);
  const chkId=cfg.chkSpaceId;
  const titleOnly = (areaId==='area-mid-toc') && !!MID_TOC_TITLE_ONLY;
  const effAnswer = (ans)=> titleOnly ? ans.split('/')[0].trim() : ans;
  cfg.items.forEach(it=>it.parts.forEach(p=>{
    const st=getState(p.key);
    if(!isMatch(st.ans,effAnswer(p.answer),chkId)) STATE[p.key]={ans:'',checked:false,revealed:false};
  }));
  const firstWrong=cfg.items.findIndex(it=>it.parts.some(p=>!getState(p.key).checked));
  CURRENT_IDX[areaId]=firstWrong>=0?firstWrong:0;
  renderSection(cfg);
}

// ── cfg 조회 ──
const CFG_MAP = {};
const ITEMS_ORIGINAL = {}; // 원본 아이템 순서 보관

function applyOrder(areaId, which){
  const randChk = document.getElementById('chk-random-'+areaId);
  const revChk = document.getElementById('chk-reverse-'+areaId);
  if(!randChk||!revChk) return;
  // 둘 중 하나만 체크
  if(which==='random'&&randChk.checked) revChk.checked=false;
  if(which==='reverse'&&revChk.checked) randChk.checked=false;

  const cfg=getCfg(areaId);
  if(!cfg) return;
  const orig=ITEMS_ORIGINAL[areaId]||cfg.items;

  if(randChk.checked){
    ORDER_MODE[areaId]='random';
    cfg.items=[...orig].sort(()=>Math.random()-.5);
  } else if(revChk.checked){
    ORDER_MODE[areaId]='reverse';
    cfg.items=[...orig].slice().reverse();
  } else {
    ORDER_MODE[areaId]='normal';
    cfg.items=[...orig];
  }
  CURRENT_IDX[areaId]=0;
  renderSection(cfg);
}
function getCfg(areaId){ return CFG_MAP[areaId]; }
function getCfgByKey(key){
  for(const id in CFG_MAP){
    const cfg=CFG_MAP[id];
    for(const it of cfg.items) for(const p of it.parts) if(p.key===key) return cfg;
  }
  return null;
}

// ── 오답 노트 ──
function renderWrongNote(){
  const area=document.getElementById('area-wrong-note');
  const items=Object.values(wrongNote);
  if(!items.length){
    area.innerHTML='<div class="empty-note"><div style="font-size:32px;margin-bottom:8px">📭</div><div>아직 오답이 없어요.</div></div>';
    return;
  }
  const html=items.map(w=>`<div class="wrong-item"><div class="wq">${escHtml(w.qLabel||'')} ${w.partLabel?'— '+escHtml(w.partLabel):''}<br><span style="color:var(--text)">${escHtml(w.qText||'')}</span></div><div class="wa">정답: ${escHtml(w.answer)}</div>${w.ua?`<div style="color:#999;font-size:12px;margin-top:2px">내 답: ${escHtml(w.ua)}</div>`:''}</div>`).join('');
  area.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <div class="wrong-list-title" style="border:none;margin:0">오답 노트 — ${items.length}개</div>
    <button class="sm danger" onclick="clearWrongNote()">초기화</button>
  </div>${html}`;
}
function clearWrongNote(){if(confirm('오답 노트를 초기화할까요?')){wrongNote={};renderWrongNote();}}
